name: General CI Build & Test Flow

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_CACHE_SIZE: "1G"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v1.94.1
        with:
          toolchain: stable
      - uses: taiki-e/install-action@e51d8b05bd75d95ec409fff6f1993c7cc6977d39 # cargo-binstall
      - run: cargo binstall --no-confirm --no-symlinks sccache
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cache/
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock') }}
      - uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3 # v2.3
      - run: cargo test --locked --no-run
      - run: cargo test --locked --no-fail-fast
      - run: cargo clippy --locked --workspace --tests --no-deps -- -D warnings
